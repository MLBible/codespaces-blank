---
layout: sidenav
---

<article class="lesson-container">
  <header class="lesson-header">
    <h1>{{ page.title }}</h1>
    <div class="lesson-meta">
      <span class="read-time">Read time: {{ page.readtime }} min</span>
    </div>
    <p class="lesson-description">{{ page.description }}</p>
  </header>

  {% if page.prerequisites %}
  <section class="prerequisites">
    <h3>Prerequisites</h3>
    <ul>
      {% for pre in page.prerequisites %}
        <li>{{ pre }}</li>
      {% endfor %}
    </ul>
  </section>
  {% endif %}

  <hr class="lesson-divider">

  <div class="lesson-body">
    {{ content }}
  </div>
</article>
